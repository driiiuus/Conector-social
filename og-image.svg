  <!-- Titular principal -->
  <text x="80" y="320" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#FAF6EF" text-anchor="start">Entiende el mundo</text>
  <text x="80" y="410" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#FAF6EF" text-anchor="start">que no ves.</text>

  <!-- Subtítulo -->

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Fondo negro editorial -->
  <rect width="1200" height="630" fill="#1C1410"/>

  <!-- Línea roja decorativa -->
